<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FO.Games | منصة الألعاب العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --bg-hover: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --font-site: 'Cairo', sans-serif;
        }

        [dir="ltr"] { --font-site: 'Inter', sans-serif; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-site);
            overflow-x: hidden;
        }

        /* الهيدر وشريط البحث */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4%;
            background-color: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #374151;
            gap: 15px;
        }

        .logo { font-size: 26px; font-weight: 700; color: var(--primary); text-decoration: none; }
        
        .search-box {
            position: relative;
            flex-grow: 1;
            max-width: 500px;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            background-color: var(--bg-main);
            border: 1px solid #374151;
            border-radius: 25px;
            color: white;
            font-family: inherit;
            outline: none;
        }
        [dir="ltr"] .search-box input { padding: 10px 15px 10px 40px; }
        .search-box i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 15px;
            color: var(--text-muted);
        }
        [dir="ltr"] .search-box i { left: 15px; right: auto; }

        .nav-controls { display: flex; gap: 10px; }
        button {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid #374151;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        button:hover { background-color: var(--primary); border-color: var(--primary); }
        #btn-install { background-color: var(--primary); border: none; display: none; }

        /* شريط التصنيفات الديناميكي */
        .genres-bar {
            display: flex;
            gap: 10px;
            padding: 15px 4%;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .genres-bar::-webkit-scrollbar { display: none; }
        .genre-chip {
            background-color: var(--bg-card);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #27272a;
            transition: all 0.2s;
        }
        .genre-chip.active, .genre-chip:hover {
            background-color: var(--primary);
            color: white;
        }

        /* شبكة عرض الألعاب */
        .games-grid {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 4%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #27272a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px -10px rgba(99, 102, 241, 0.5);
            border-color: var(--primary);
        }

        .media-holder {
            width: 100%;
            aspect-ratio: 16 / 11;
            position: relative;
            background-color: #000;
        }
        .game-img, .game-vid {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; transition: opacity 0.3s ease;
        }
        .game-vid { opacity: 0; pointer-events: none; }
        .game-card:hover .game-vid { opacity: 1; }
        .game-card:hover .game-img { opacity: 0; }

        /* شارات فوق الكارت */
        .card-badges {
            position: absolute; top: 8px; right: 8px;
            display: flex; gap: 5px; z-index: 5;
        }
        [dir="ltr"] .card-badges { right: auto; left: 8px; }
        .badge {
            background: rgba(0,0,0,0.75); padding: 4px 8px;
            border-radius: 6px; font-size: 11px; backdrop-filter: blur(4px);
        }

        .game-meta { padding: 14px; }
        .game-title { font-weight: 700; font-size: 15px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-genres-list { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #loading-trigger { grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 15px; }

        /* مودال تشغيل ولستة تفاصيل اللعبة الكاملة */
        .game-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(7, 10, 19, 0.98); z-index: 200;
            display: none; flex-direction: column;
        }
        .modal-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 3%; background-color: var(--bg-card); border-bottom: 1px solid #27272a;
        }
        .modal-body { display: flex; flex-grow: 1; overflow: hidden; }
        .iframe-space { flex-grow: 1; height: 100%; background: #000; }
        .iframe-space iframe { width: 100%; height: 100%; border: none; }
        
        /* الجانب الجانبي للتفاصيل كبلاي جاما */
        .details-sidebar {
            width: 380px; min-width: 380px; background-color: var(--bg-card);
            border-left: 1px solid #27272a; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; gap: 20px;
        }
        [dir="ltr"] .details-sidebar { border-left: none; border-right: 1px solid #27272a; }

        .details-sidebar h4 { color: var(--primary); font-size: 16px; border-bottom: 1px solid #374151; padding-bottom: 5px; }
        .details-text { font-size: 13px; color: #d1d5db; line-height: 1.6; white-space: pre-line; }
        .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #1f2937; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag-item { background: var(--bg-hover); padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--text-muted); }

        @media (max-width: 992px) {
            .modal-body { flex-direction: column; overflow-y: auto; }
            .iframe-space { height: 60vh; min-height: 400px; }
            .details-sidebar { width: 100%; min-width: 100%; overflow-y: visible; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">FO.Games</a>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="ابحث عن لعبتك المفضلة..." data-ar="ابحث عن لعبتك المفضلة..." data-en="Search your favorite game...">
        </div>
        <div class="nav-controls">
            <button id="btn-install"><i class="fa-solid fa-download"></i> <span class="lang-node" data-ar="تثبيت" data-en="Install">تثبيت</span></button>
            <button id="btn-lang"><i class="fa-solid fa-language"></i> <span>English</span></button>
        </div>
    </header>

    <!-- شريط التصنيفات -->
    <div class="genres-bar" id="genres-container"></div>

    <!-- حاوية الألعاب الرئيسية -->
    <main class="games-grid" id="games-holder">
        <div id="loading-trigger"><i class="fa-solid fa-circle-notch fa-spin"></i> <span class="lang-node" data-ar="جاري استدعاء الألعاب..." data-en="Loading Games Database...">جاري استدعاء الألعاب...</span></div>
    </main>

    <!-- المودال المتكامل للعب والتفاصيل -->
    <div class="game-modal" id="gameModal">
        <div class="modal-top">
            <h3 id="m-title">Game Title</h3>
            <button onclick="closeGame()"><i class="fa-solid fa-xmark"></i> <span class="lang-node" data-ar="إغلاق" data-en="Close">إغلاق</span></button>
        </div>
        <div class="modal-body">
            <div class="iframe-space">
                <iframe id="gameIframe" src="" allowfullscreen></iframe>
            </div>
            <div class="details-sidebar">
                <div>
                    <h4 class="lang-node" data-ar="عن اللعبة" data-en="About The Game">عن اللعبة</h4>
                    <p class="details-text" id="m-desc"></p>
                </div>
                <div>
                    <h4 class="lang-node" data-ar="كيفية اللعب" data-en="How To Play">كيفية اللعب</h4>
                    <p class="details-text" id="m-howto"></p>
                </div>
                <div>
                    <h4 class="lang-node" data-ar="معلومات تقنية" data-en="Technical Specs">معلومات تقنية</h4>
                    <div class="info-row"><span class="lang-node" data-ar="التوجيه" data-en="Orientation">التوجيه</span><span id="m-orient">-</span></div>
                    <div class="info-row"><span class="lang-node" data-ar="شراء داخل اللعبة" data-en="In-App Purchases">شراء داخل اللعبة</span><span id="m-purchases">-</span></div>
                    <div class="info-row"><span class="lang-node" data-ar="اللغات المدعومة" data-en="Languages">اللغات المدعومة</span><span id="m-langs">-</span></div>
                </div>
                <div>
                    <h4 class="lang-node" data-ar="الوسوم" data-en="Tags">الوسوم</h4>
                    <div class="tags-container" id="m-tags"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawGames = [];
        let filteredGames = [];
        let displayedCount = 0;
        const step = 24;
        let currentLang = 'ar';
        let activeGenre = 'all';
        let searchQuery = '';

        // 1. جلب البيانات من ملف الـ JSON المرفوع
        async function initPlatform() {
            try {
                const res = await fetch('games.json');
                const data = await res.json();
                rawGames = data.segments[0].hits;
                
                buildGenresBar();
                applyFilters();
            } catch (err) {
                console.error("فشل في تحميل قاعدة البيانات الحقيقية، تأكد من رفع ملف games.JSON", err);
            }
        }

        // 2. بناء شريط التصنيفات ديناميكياً من الألعاب المتاحة فعلاً
        function buildGenresBar() {
            const container = document.getElementById('genres-container');
            const allGenres = new Set();
            rawGames.forEach(g => g.genres && g.genres.forEach(genre => allGenres.add(genre)));

            let html = `<div class="genre-chip active" id="chip-all" onclick="filterByGenre('all')">${currentLang === 'ar' ? 'الكل' : 'All'}</div>`;
            allGenres.forEach(genre => {
                html += `<div class="genre-chip" id="chip-${genre}" onclick="filterByGenre('${genre}')">${genre}</div>`;
            });
            container.innerHTML = html;
        }

        // 3. تطبيق الفلترة بالبحث والتصنيف معاً
        function filterByGenre(genre) {
            activeGenre = genre;
            document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
            document.getElementById(`chip-${genre}`).classList.add('active');
            applyFilters();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            applyFilters();
        });

        function applyFilters() {
            filteredGames = rawGames.filter(game => {
                const matchesGenre = activeGenre === 'all' || (game.genres && game.genres.includes(activeGenre));
                const matchesSearch = game.title.toLowerCase().includes(searchQuery) || 
                                      (game.description && game.description.toLowerCase().includes(searchQuery));
                return matchesGenre && matchesSearch;
            });

            // إعادة تعيين الجريد بالكامل
            displayedCount = 0;
            const grid = document.getElementById('games-holder');
            document.querySelectorAll('.game-card').forEach(c => c.remove());
            document.getElementById('loading-trigger').style.display = 'block';
            
            renderBatch();
        }

        // 4. رص الألعاب (Batch Rendering) مع الفيديوهات والأيقونات
        function renderBatch() {
            const grid = document.getElementById('games-holder');
            const trigger = document.getElementById('loading-trigger');
            const nextBatch = filteredGames.slice(displayedCount, displayedCount + step);

            nextBatch.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => openGame(game);

                // تجهيز الفيديوهات عند الهوفر
                let videoSrc = '';
                if (game.videos && game.videos.length > 0) {
                    videoSrc = game.videos[0].external_url ? game.videos[0].external_url : `https://static.playgama.com/v/${game.videos[0].playgama_id}.mp4`;
                }

                // تجهيز شارات الأجهزة والاتجاه
                let orientationIcon = game.screenOrientation?.horizontal ? 'fa-square-caret-right' : 'fa-mobile-screen-button';
                let mobileSupport = game.mobileReady?.includes('For Android') || game.mobileReady?.includes('For IOS') ? '<i class="fa-solid fa-mobile-retro"></i>' : '';

                card.innerHTML = `
                    <div class="media-holder">
                        <img class="game-img" src="${game.images[0]}" alt="${game.title}" loading="lazy">
                        ${videoSrc ? `<video class="game-vid" src="${videoSrc}" loop muted playsinline></video>` : ''}
                        <div class="card-badges">
                            <span class="badge"><i class="fa-solid ${orientationIcon}"></i></span>
                            ${mobileSupport ? `<span class="badge">${mobileSupport}</span>` : ''}
                        </div>
                    </div>
                    <div class="game-meta">
                        <div class="game-title">${game.title}</div>
                        <div class="game-genres-list">${game.genres ? game.genres.join(', ') : ''}</div>
                    </div>
                `;

                // أحداث التحكم بالفيديو لتجنب الثقل
                card.addEventListener('mouseenter', () => { const v = card.querySelector('video'); if(v) v.play().catch(()=>{}); });
                card.addEventListener('mouseleave', () => { const v = card.querySelector('video'); if(v) { v.pause(); v.currentTime = 0; } });

                grid.insertBefore(card, trigger);
            });

            displayedCount += step;
            if (displayedCount >= filteredGames.length) {
                trigger.style.display = 'none';
            }
        }

        // 5. إنفينت سكرول ذكي
        const scrollObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && displayedCount < filteredGames.length) {
                renderBatch();
            }
        }, { threshold: 0.1 });
        scrollObserver.observe(document.getElementById('loading-trigger'));

        // 6. فتح لوحة تفاصيل ولعب اللعبة بالكامل
        function openGame(game) {
            document.getElementById('m-title').innerText = game.title;
            document.getElementById('gameIframe').src = game.gameURL;
            document.getElementById('m-desc').innerText = game.description || 'No description available.';
            document.getElementById('m-howto').innerText = game.howToPlayText || 'Use on-screen buttons or mouse controls.';
            
            // قراءة الخصائص الفنية
            document.getElementById('m-orient').innerText = game.screenOrientation?.horizontal ? (currentLang === 'ar' ? 'أفقي' : 'Horizontal') : (currentLang === 'ar' ? 'رأسي' : 'Vertical');
            document.getElementById('m-purchases').innerText = game.inGamePurchases === "Yes" ? (currentLang === 'ar' ? 'نعم' : 'Yes') : (currentLang === 'ar' ? 'لا' : 'No');
            document.getElementById('m-langs').innerText = game.supportedLanguages ? game.supportedLanguages.join(', ') : 'en-US';

            // بناء التاغات المخصصة للعبة
            const tagsBox = document.getElementById('m-tags');
            tagsBox.innerHTML = '';
            if (game.tags) {
                game.tags.forEach(t => {
                    const el = document.createElement('span');
                    el.className = 'tag-item';
                    el.innerText = t;
                    tagsBox.appendChild(el);
                });
            }

            document.getElementById('gameModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameIframe').src = '';
            document.body.style.overflow = 'auto';
        }

        // 7. زرار الترجمة الشامل لاتجاهات الموقع والنصوص والمدخلات
        document.getElementById('btn-lang').addEventListener('click', () => {
            const html = document.documentElement;
            if (currentLang === 'ar') {
                currentLang = 'en';
                html.setAttribute('dir', 'ltr');
                html.setAttribute('lang', 'en');
                document.getElementById('btn-lang').querySelector('span').innerText = 'العربية';
            } else {
                currentLang = 'ar';
                html.setAttribute('dir', 'rtl');
                html.setAttribute('lang', 'ar');
                document.getElementById('btn-lang').querySelector('span').innerText = 'English';
            }

            // تحديث نصوص النظام الثابتة
            document.querySelectorAll('.lang-node').forEach(n => {
                n.innerText = n.getAttribute(`data-${currentLang}`);
            });

            // تحديث شريط البحث placeholders
            const srcInp = document.getElementById('search-input');
            srcInp.placeholder = srcInp.getAttribute(`data-${currentLang}`);

            // إعادة بناء التصنيفات لترجمة زر "الكل / All"
            buildGenresBar();
        });

        // 8. دعم ميزة زر التثبيت PWA
        let pwaPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            pwaPrompt = e;
            document.getElementById('btn-install').style.display = 'flex';
        });
        document.getElementById('btn-install').addEventListener('click', async () => {
            if (pwaPrompt) {
                pwaPrompt.prompt();
                const { outcome } = await pwaPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('btn-install').style.display = 'none';
                pwaPrompt = null;
            }
        });

        window.onload = initPlatform;
    </script>
</body>
</html>
